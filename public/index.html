<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexRide | Akıllı Taksi Çözümü</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/store.js"></script>

</head>

<body>
    <div id="loading" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <div class="app-container" style="padding-top: 100px;">
        <!-- Auth Section -->
        <div id="authSection" class="card fade-in">
            <h1 id="authTitle">Hoş Geldiniz</h1>
            <div class="tabs"
                style="display: flex; gap: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 12px;">
                <button id="loginTab" class="btn btn-primary" style="flex: 1;" onclick="switchTab('login')">Giriş
                    Yap</button>
                <button id="registerTab" class="btn btn-secondary" style="flex: 1;"
                    onclick="switchTab('register')">Kayıt Ol</button>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label>E-posta</label>
                    <input type="email" id="loginEmail" placeholder="admin@example.com" required>
                </div>
                <div class="form-group">
                    <label>Şifre</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    Devam Et <i data-lucide="arrow-right"></i>
                </button>
            </form>

            <form id="registerForm" style="display: none;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="form-group">
                        <label>Ad</label>
                        <input type="text" id="regFirstName" required>
                    </div>
                    <div class="form-group">
                        <label>Soyad</label>
                        <input type="text" id="regLastName" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>TC Kimlik No</label>
                    <input type="text" id="regTc" maxlength="11" required>
                </div>
                <div class="form-group">
                    <label>E-posta</label>
                    <input type="email" id="regEmail" required>
                </div>
                <div class="form-group">
                    <label>Şifre</label>
                    <input type="password" id="regPassword" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Hesap Oluştur</button>
            </form>
        </div>

        <!-- Booking Section -->
        <div id="bookingSection" style="display: none; width: 100%; max-width: 900px;" class="fade-in">
            <div class="grid" style="display: grid; grid-template-columns: 1.8fr 1fr; gap: 20px;">
                <div class="card" style="max-width: none;">
                    <h2 style="display: flex; align-items: center; gap: 10px;"><i data-lucide="map-pin"></i> Nereye
                        Gidiyoruz?</h2>
                    <div id="map"
                        style="height: 450px; border-radius: 15px; margin: 20px 0; border: 1px solid var(--border);">
                    </div>

                    <div class="grid"
                        style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                        <div class="form-group">
                            <label>Başlangıç Noktası</label>
                            <input type="text" id="startLocation" readonly placeholder="🚕 İstasyon seçin">
                        </div>
                        <div class="form-group">
                            <label>Varış Noktası</label>
                            <input type="text" id="destLocation" readonly placeholder="📍 Haritadan seçin">
                        </div>
                    </div>

                    <div class="grid"
                        style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                        <div class="form-group">
                            <label>Yolculuk Tarihi</label>
                            <input type="date" id="bookingDateInput">
                        </div>
                        <div class="form-group">
                            <label>Yolculuk Saati</label>
                            <input type="time" id="bookingTimeInput">
                        </div>
                    </div>

                    <div id="priceCard"
                        style="background: linear-gradient(to right, rgba(99, 102, 241, 0.1), rgba(192, 132, 252, 0.1)); padding: 25px; border-radius: 20px; margin-bottom: 20px; border: 1px solid var(--border); transition: all 0.5s ease;">
                        <div style="display: flex; justify-content: space-between; align-items: center; gap: 20px;">
                            <div id="priceInfoPlaceholder" style="flex: 1;">
                                <div style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;">Yolculuk Durumu</div>
                                <div id="priceStatusText" style="font-size: 1.1rem; font-weight: 600; color: white;">🚩 Lütfen Varış Noktası Seçin</div>
                            </div>
                            <div id="priceInfoActual" style="display: none; flex: 1;">
                                <div style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;">Tahmini Ücret</div>
                                <div id="estimatedPrice" style="font-size: 2.2rem; font-weight: 800; color: white; line-height: 1;">₺0.00</div>
                            </div>
                            <button id="bookBtn" class="btn btn-primary" disabled
                                style="padding: 15px 35px; font-size: 1.2rem; min-width: 200px; opacity: 0.5; cursor: not-allowed;">
                                <span id="bookBtnText">Hemen Çağır</span> 
                                <i data-lucide="chevron-right"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="sidebar-info">
                    <div class="card" style="margin-bottom: 20px;">
                        <h3 style="display: flex; align-items: center; gap: 10px;"><i data-lucide="users"></i> Müsait
                            Sürücüler</h3>
                        <div id="driverList"
                            style="margin-top: 15px; display: flex; flex-direction: column; gap: 12px;"></div>
                    </div>
                    <div class="card">
                        <h3 style="display: flex; align-items: center; gap: 10px;"><i data-lucide="history"></i> Son
                            Yolculuklar</h3>
                        <div id="recentBookings" style="margin-top: 15px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Payment Modal -->
    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <div
                style="width: 80px; height: 80px; background: rgba(99, 102, 241, 0.1); border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; color: var(--primary);">
                <i data-lucide="credit-card" style="width: 40px; height: 40px;"></i>
            </div>
            <h2 style="margin-bottom: 10px;">Ödeme Onayı</h2>
            <p id="paymentText" style="color: var(--text-muted); margin-bottom: 20px;"></p>
            
            <div id="paymentMethodsSection" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                <button onclick="showWalletVerification()" class="btn btn-primary">Cüzdan (₺)</button>
                <button onclick="payWithCash()" class="btn btn-secondary">Nakit (💵)</button>
            </div>

            <div id="verificationSection" style="margin-bottom: 20px; text-align: left; display: none;">
                <label style="font-size: 0.8rem; color: var(--text-muted);">Doğrulama Kodu</label>
                <input type="text" id="verificationCodeInput" placeholder="6 Haneli Kod" maxlength="6" style="letter-spacing: 5px; text-align: center; font-weight: 700;">
                
                <button id="sendCodeBtn" onclick="sendPaymentCode()" class="btn btn-secondary" style="width: 100%; margin-top: 10px; background: rgba(99,102,241,0.1); border: 1px dashed var(--primary); color: var(--primary);">
                    Güvenlik Kodunu Gönder
                </button>

                <button onclick="payWithWallet()" class="btn btn-primary" style="width: 100%; margin-top: 15px; padding: 15px;">Cüzdan'dan Çek ve Onayla</button>
            </div>

            <button onclick="closeModal()" class="btn btn-danger"
                style="width: 100%; margin-top: 15px; background: transparent;">Vazgeç</button>
        </div>
    </div>

    <!-- Live Driver Status Card -->
    <div id="driverStatusCard" style="display: none; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 90%; max-width: 400px; background: var(--glass-bg); backdrop-filter: blur(15px); padding: 20px; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.4); animation: slideUp 0.5s ease;">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div id="driverStatusIcon" style="background: var(--primary)20; color: var(--primary); padding: 12px; border-radius: 16px;">
                <i data-lucide="car"></i>
            </div>
            <div style="flex: 1;">
                <div style="font-weight: 700; color: white; font-size: 1rem;" id="driverStatusTitle">Sürücü Yolda</div>
                <div style="font-size: 0.8rem; color: var(--text-muted);" id="driverStatusInfo">Size doğru yaklaşıyor...</div>
            </div>
            <div style="text-align: right;">
                <div style="font-size: 1.2rem; font-weight: 800; color: var(--primary-light);" id="liveDistanceText">...</div>
                <div style="font-size: 0.6rem; color: var(--text-muted); letter-spacing: 1px;">CANLI MESAFE</div>
            </div>
        </div>
    </div>

    <script>
        let map, startMarker, endMarker, lastBookingId = null, socket, driverMarkers = {};
        let selectedStation = null, selectedDistance = 0, currentPrice = 0, selectedDriverId = null;
        const TAXI_STATIONS = [
            { id: 1, name: "Kızılay Merkez Taksi", lat: 39.9208, lng: 32.8541 },
            { id: 2, name: "Tunalı Hilmi Taksi", lat: 39.9075, lng: 32.8625 },
            { id: 3, name: "Bahçelievler 7. Cad. Taksi", lat: 39.9247, lng: 32.8228 },
            { id: 4, name: "Çankaya Atakule Taksi", lat: 39.8860, lng: 32.8548 },
            { id: 5, name: "Esat Dörtyol Taksi", lat: 39.9110, lng: 32.8690 },
            { id: 6, name: "Yenimahalle Metro Taksi", lat: 39.9670, lng: 32.8020 },
            { id: 7, name: "Keçiören Belediye Taksi", lat: 39.9780, lng: 32.8650 },
            { id: 8, name: "Anıttepe Taksi", lat: 39.9270, lng: 32.8420 }
        ];
        let stationMarkers = [];

    function init() {
        // Yükleme ekranını hemen gizle (hatalar olsa bile kullanıcı arayüzü görsün)
        const loading = document.getElementById('loading');
        if (loading) setTimeout(() => loading.classList.add('loading-hidden'), 200);

        const user = Store.getUser();
    if (user) {
    Store.renderNavbar();
    document.getElementById('authSection').style.display = 'none';
    document.getElementById('bookingSection').style.display = 'block';

    // Socket.io Bağlantısı
    socket = io();
    socket.emit('join', { userId: user.id, role: user.role });

    // Sürücü hareketlerini dinle
    socket.on('driver:moved', (data) => {
        console.log('📡 Sürücü hareket etti:', data);
        updateDriverOnMap(data);
    });

    // Rezervasyon durum güncellemelerini dinle
    socket.on('booking:status-updated', (data) => {
        console.log('🔔 Rezervasyon Durumu Güncellendi:', data);
        if (data.bookingId === lastBookingId) {
            showToast(`Sürücü Rezervasyonu Onayladı!`, 'success');
            Store.playSound('success');
            
            // Eğer simülasyon başlamadıysa başlat
            if (!window.isSimulating) {
                window.isSimulating = true;
                simulateDriverJourney();
            }

            // Takip sayfasına yönlendir
            setTimeout(() => {
                window.location.href = `/maps.html?id=${data.bookingId}`;
            }, 3000);

            loadRecentBookings();
        }
    });

    // Varsayılan tarih ve saat
    const now = new Date();
    document.getElementById('bookingDateInput').value = now.toISOString().split('T')[0];
    document.getElementById('bookingTimeInput').value = now.toTimeString().split(' ')[0].slice(0, 5);

    initMap();
    startUserLocationTracking();
    loadDrivers();
    loadRecentBookings();
    lucide.createIcons();
    } else {
    document.getElementById('authSection').style.display = 'block';
    document.getElementById('bookingSection').style.display = 'none';
    }
    lucide.createIcons();
    }


    function switchTab(type) {
    const isLogin = type === 'login';
    document.getElementById('loginForm').style.display = isLogin ? 'block' : 'none';
    document.getElementById('registerForm').style.display = isLogin ? 'none' : 'block';
    document.getElementById('authTitle').textContent = isLogin ? 'Hoş Geldiniz' : 'Yeni Kayıt';
    document.getElementById('loginTab').className = isLogin ? 'btn btn-primary' : 'btn btn-secondary';
    document.getElementById('registerTab').className = isLogin ? 'btn btn-secondary' : 'btn btn-primary';
    lucide.createIcons();
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    const res = await Store.api('/api/login', { method: 'POST', body: JSON.stringify({ email, password }) });
    const data = await res.json();
    if (data.success) {
    Store.setUser(data.user, data.token);
    Store.showAlert('Giriş başarılı!', 'success');
    setTimeout(() => window.location.href = '/menu.html', 800);
    } else {
    Store.showAlert(data.error, 'error');
    }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = {
    firstName: document.getElementById('regFirstName').value,
    lastName: document.getElementById('regLastName').value,
    tcNo: document.getElementById('regTc').value,
    email: document.getElementById('regEmail').value,
    password: document.getElementById('regPassword').value
    };
    const res = await Store.api('/api/register', { method: 'POST', body: JSON.stringify(formData) });
    const data = await res.json();
    if (data.success) {
    Store.showAlert('Kayıt başarılı! Giriş yapabilirsiniz.', 'success');
    switchTab('login');
    } else {
    Store.showAlert(data.error, 'error');
    }
    });

        function calculateLiveDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // metres
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function updateDriverOnMap(data) {
            const { driverId, lat, lng } = data;
            if (!map) return;

                if (driverMarkers[driverId]) {
                    driverMarkers[driverId].setLatLng([lat, lng]);
                } else {
                    driverMarkers[driverId] = L.marker([lat, lng], {
                        icon: L.divIcon({
                            className: 'driver-live-icon',
                            html: `
                                <div style="position:relative;">
                                    <div class="pulse-ring" style="position:absolute; top:-10px; left:-10px; width:50px; height:50px; background:rgba(245,158,11,0.3); border-radius:50%;"></div>
                                    <div style="background:#f59e0b; color:white; border-radius:12px; width:34px; height:34px; display:flex; align-items:center; justify-content:center; box-shadow:0 0 20px rgba(245,158,11,0.6); border:2px solid white; position:relative; z-index:2; font-size:1.2rem;">🚕</div>
                                    <div style="position:absolute; top:-25px; left:50%; transform:translateX(-50%); background:black; color:white; font-size:0.6rem; padding:2px 6px; border-radius:4px; white-space:nowrap; font-weight:700;">CANLI SÜRÜCÜ</div>
                                </div>
                            `
                        })
                    }).addTo(map);
                }

            // Canlı Mesafe Hesaplama (Eğer simülasyon/takip aktifse)
            if (startMarker && window.isSimulating) {
                const passengerPos = startMarker.getLatLng();
                const dist = calculateLiveDistance(lat, lng, passengerPos.lat, passengerPos.lng);
                
                const distText = dist > 1000 ? (dist/1000).toFixed(2) + ' km' : Math.round(dist) + ' m';
                document.getElementById('liveDistanceText').textContent = distText;
                document.getElementById('driverStatusCard').style.display = 'block';
                
                if (dist < 50) {
                    document.getElementById('driverStatusTitle').textContent = 'Sürücü Kapıda!';
                    document.getElementById('driverStatusInfo').textContent = 'Lütfen aracınıza binin.';
                    document.getElementById('driverStatusIcon').style.background = 'var(--success)20';
                    document.getElementById('driverStatusIcon').style.color = 'var(--success)';
                }
                lucide.createIcons();
            }
        }

        function startUserLocationTracking() {
            if (!navigator.geolocation) return showToast('Konum takibi desteklenmiyor.', 'error');

            navigator.geolocation.watchPosition((pos) => {
                const { latitude, longitude } = pos.coords;
                const userLatLng = [latitude, longitude];

                if (!startMarker) {
                    // İlk kez konum alındığında
                    startMarker = L.marker(userLatLng, {
                        icon: L.divIcon({
                            className: 'start-icon',
                            html: `<div style="background:var(--success); color:white; border-radius:50%; width:34px; height:34px; display:flex; align-items:center; justify-content:center; box-shadow:0 0 20px var(--success); border:2px solid white;">👤</div>`
                        })
                    }).addTo(map);
                    map.setView(userLatLng, 15);
                } else {
                    // Konum güncellendiğinde
                    startMarker.setLatLng(userLatLng);
                }
                
                document.getElementById('startLocation').value = `${latitude.toFixed(4)}, ${longitude.toFixed(4)}`;
                
                // Eğer varış noktası zaten seçiliyse mesafeyi güncelle
                if (endMarker) {
                    const destPos = endMarker.getLatLng();
                    calculateDistance(latitude, longitude, destPos.lat, destPos.lng);
                }

                // Canlı konumu adminlerin görebilmesi için sunucuya ilet
                const u = Store.getUser();
                if (u && socket) {
                    socket.emit('user:location-update', { 
                        userId: u.id, 
                        userName: u.firstName + ' ' + u.lastName, 
                        lat: latitude, 
                        lng: longitude 
                    });
                }
            }, (err) => {
                console.error('Konum hatası:', err);
                showToast('Konumunuza erişilemedi. Lütfen izin verin.', 'warning');
            }, { enableHighAccuracy: true });
        }

        function initMap() {
            if (map) return;
            map = L.map('map', { zoomControl: false }).setView([39.9334, 32.8597], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            // Arama Kontrolü Ekle (Geocoder)
            L.Control.geocoder({
                defaultMarkGeocode: false,
                placeholder: "Varış noktası ara..."
            }).on('markgeocode', function(e) {
                var bbox = e.geocode.bbox;
                var poly = L.polygon([
                    bbox.getSouthEast(),
                    bbox.getNorthEast(),
                    bbox.getNorthWest(),
                    bbox.getSouthWest()
                ]);
                map.fitBounds(poly.getBounds());
            }).addTo(map);

            // Taksi İstasyonlarını Çiz
            TAXI_STATIONS.forEach(s => {
                const marker = L.marker([s.lat, s.lng], {
                    icon: L.divIcon({
                        className: 'station-icon',
                        html: `<div style="background:var(--primary); color:white; border-radius:12px; padding:5px 10px; display:flex; align-items:center; gap:5px; font-size:0.7rem; font-weight:700; box-shadow:0 5px 15px rgba(0,0,0,0.3); border:1px solid white; white-space:nowrap;">🚖 ${s.name}</div>`
                    })
                }).addTo(map);
                stationMarkers.push(marker);
            });

            map.on('click', (e) => {
                if (!endMarker) {
                    // Sadece varış noktasını seçtir
                    endMarker = L.marker(e.latlng, {
                        icon: L.divIcon({
                            className: 'end-icon',
                            html: `<div style="background:var(--secondary); color:white; border-radius:50%; width:34px; height:34px; display:flex; align-items:center; justify-content:center; box-shadow:0 0 20px var(--secondary); border:2px solid white;">📍</div>`
                        })
                    }).addTo(map);
                    document.getElementById('destLocation').value = `${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}`;
                    
                    if (startMarker) {
                        calculateDistance(startMarker.getLatLng().lat, startMarker.getLatLng().lng, e.latlng.lat, e.latlng.lng);
                    }
                    Store.showAlert('Varış noktası seçildi!', 'success');
                } else {
                    // Reset varış noktası
                    map.removeLayer(endMarker);
                    endMarker = null;
                    document.getElementById('destLocation').value = '';
                    
                    // UI Sıfırlama
                    document.getElementById('priceInfoPlaceholder').style.display = 'block';
                    document.getElementById('priceInfoActual').style.display = 'none';
                    const btn = document.getElementById('bookBtn');
                    btn.disabled = true;
                    btn.style.opacity = '0.5';
                    btn.style.cursor = 'not-allowed';
                    document.getElementById('bookBtnText').textContent = 'Hemen Çağır';
                    document.getElementById('priceCard').style.borderColor = 'var(--border)';
                    
                    Store.showAlert('Yeni bir varış noktası seçebilirsiniz.', 'info');
                }
            });
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            selectedDistance = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            
            // YENİ FİYAT HESAPLAMA: 15₺ Baz + 8₺/km
            currentPrice = Math.round((selectedDistance * 8 + 15) * 2) / 2;
            
            document.getElementById('estimatedPrice').textContent = Store.formatCurrency(currentPrice);
            
            // UI Güncelleme
            document.getElementById('priceInfoPlaceholder').style.display = 'none';
            document.getElementById('priceInfoActual').style.display = 'block';
            
            const btn = document.getElementById('bookBtn');
            btn.disabled = false;
            btn.style.opacity = '1';
            btn.style.cursor = 'pointer';
            document.getElementById('bookBtnText').textContent = 'Yolculuğu Başlat';
            
            document.getElementById('priceCard').style.borderColor = 'var(--primary)';
        }

    async function loadDrivers() {
        // Skeleton loader simülasyonu
        document.getElementById('driverList').innerHTML = [1,2,3].map(() => `
            <div class="skeleton" style="height:60px; margin-bottom:10px;"></div>
        `).join('');

        const res = await Store.api('/api/drivers/available');
        const drivers = await res.json();
        
        if (drivers.length === 0) {
            document.getElementById('driverList').innerHTML = '<p class="text-muted" style="font-size:0.8rem;">Şu an müsait sürücü yok.</p>';
            return;
        }

        document.getElementById('driverList').innerHTML = drivers.map(d => {
            const initial = d.name.charAt(0);
            const colors = ['#6366f1', '#8b5cf6', '#ec4899', '#f59e0b', '#10b981'];
            const color = colors[d.id % colors.length];
            
            return `
            <div id="driver-${d.id}" class="driver-card" onclick="selectDriver(${d.id})"
                style="background:var(--glass-bg); padding:12px; border-radius:12px; border:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; cursor:pointer; transition: all 0.3s ease;">
                <div style="display:flex; align-items:center; gap:12px;">
                    <div class="driver-avatar" style="background:${color}">${initial}</div>
                    <div>
                        <div style="font-weight:600; color:white;">${d.name}</div>
                        <div style="font-size:0.75rem; color:var(--text-muted);">${d.carModel} • ${d.plate}</div>
                    </div>
                </div>
                <div style="text-align:right;">
                    <div style="color:var(--star); font-size:0.9rem; font-weight:700;">★ ${d.avgScore ? d.avgScore.toFixed(1) : '5.0'}</div>
                    <div style="font-size:0.6rem; color:var(--success);">MÜSAİT</div>
                </div>
            </div>
            `;
        }).join('');
    }

    function selectDriver(id) {
    // Önceki seçimi temizle
    if (selectedDriverId) {
    const oldCard = document.getElementById(`driver-${selectedDriverId}`);
    if (oldCard) oldCard.classList.remove('selected');
    }

    // Yeni seçimi yap
    selectedDriverId = id;
    const newCard = document.getElementById(`driver-${id}`);
    if (newCard) newCard.classList.add('selected');
    }

    async function loadRecentBookings() {
    const user = Store.getUser();
    const res = await Store.api(`/api/bookings/my-bookings/${user.id}`);
    const bookings = await res.json();
    if (!Array.isArray(bookings)) {
        console.error('Rezervasyonlar yüklenemedi:', bookings);
        return;
    }
    const list = document.getElementById('recentBookings');
    if (bookings.length === 0) return list.innerHTML = '<p class="text-muted" style="font-size:0.8rem;">Yolculuk kaydı yok.</p>';
    list.innerHTML = bookings.slice(0, 4).map(b => `
    <div style="padding:10px 0; border-bottom:1px solid var(--border);">
        <div style="font-weight:600; font-size:0.85rem;">${b.destination.substring(0, 25)}...</div>
        <div
            style="display:flex; justify-content:space-between; font-size:0.7rem; color:var(--text-muted); margin-top:4px;">
            <span>${Store.formatDate(b.created_at)}</span>
            <span
                style="color:${b.status === 'Ödendi' ? 'var(--success)' : 'var(--warning)'}; font-weight:700;">${b.status.toUpperCase()}</span>
        </div>
        ${(b.status === 'Onaylandı' || b.status === 'Yolda') ? `
            <button onclick="window.location.href='/maps.html?id=${b.id}'" class="btn btn-primary btn-sm" style="width:100%; margin-top:8px; font-size:0.7rem; padding:5px;">Canlı Takip Et 📍</button>
        ` : ''}
    </div>
    `).join('');
    }

    document.getElementById('bookBtn').addEventListener('click', async () => {
    const user = Store.getUser();
    const destination = document.getElementById('destLocation').value;
    const date = document.getElementById('bookingDateInput').value;
    const time = document.getElementById('bookingTimeInput').value;

    if (!destination) return Store.showAlert('Lütfen haritadan bir varış noktası seçin.', 'error');
    if (!selectedDriverId) return Store.showAlert('Lütfen bir sürücü seçin.', 'error');
    if (!date || !time) return Store.showAlert('Lütfen tarih ve saat seçin.', 'error');

    const bookingData = {
    userId: user.id,
    driverId: selectedDriverId,
    destination: destination,
    pickupLocation: document.getElementById('startLocation').value,
    bookingDate: `${date} ${time}`,
    price: currentPrice
    };

    const res = await Store.api('/api/bookings', {
    method: 'POST',
    body: JSON.stringify(bookingData)
    });
    const data = await res.json();

    if (res.ok) {
        lastBookingId = data.id;
        window.isSimulating = false; // Yeni rezervasyon için sıfırla
        document.getElementById('paymentText').innerHTML = `<b>${selectedDistance.toFixed(2)} km</b> mesafe için
        <b>${Store.formatCurrency(currentPrice)}</b> ücret belirlendi.`;
        document.getElementById('paymentModal').style.display = 'flex';
        
        // Gerçek zamanlı güncellemeleri başlat
        startRealtimeUpdates(user.id);
        
        lucide.createIcons();
    }
    });

    function startRealtimeUpdates(userId) {
        const source = new EventSource(`/api/bookings/booking-updates/${userId}`);
        source.onmessage = (event) => {
            const bookings = JSON.parse(event.data);
            const currentBooking = bookings.find(b => b.id === lastBookingId);
            if (currentBooking && (currentBooking.status === 'Onaylandı' || currentBooking.status === 'Yolda')) {
                // Eğer simülasyon başlamadıysa başlat
                if (!window.isSimulating) {
                    window.isSimulating = true;
                    showToast(`Sürücü Kabul Etti! Durum: ${currentBooking.status}`, 'success');
                    simulateDriverJourney();
                }

                // Takip sayfasına yönlendir
                setTimeout(() => {
                    window.location.href = `/tracking.html?id=${lastBookingId}`;
                }, 3000);
            }

            if (currentBooking && currentBooking.status !== 'Bekliyor' && currentBooking.status !== 'Ödendi' && currentBooking.status !== 'Onaylandı' && currentBooking.status !== 'Yolda') {
                showToast(`Yolculuk Durumu: ${currentBooking.status}`, 'info');
                
                if (currentBooking.status === 'İptal Edildi') {
                    Store.playSound('error');
                } else {
                    Store.playSound('success');
                }

                loadRecentBookings();
                if (currentBooking.status === 'Tamamlandı' || currentBooking.status === 'İptal Edildi') {
                    window.isSimulating = false;
                    document.getElementById('driverStatusCard').style.display = 'none';
                    source.close();
                }
            }
        };
        source.onerror = () => source.close();
    }

    async function payWithCash() {
        const user = Store.getUser();
        if (!lastBookingId) return showToast('Rezervasyon bilgisi bulunamadı. Lütfen sayfayı yenileyip tekrar deneyin.', 'error');

        const res = await Store.api('/api/wallet/pay', { 
            method: 'POST', 
            body: JSON.stringify({ 
                userId: user.id, 
                bookingId: lastBookingId, 
                method: 'Cash' 
            }) 
        });

        if (res.ok) {
            showToast('Nakit ödeme seçildi! Sürücü aranıyor...', 'success');
            closeModal();
            loadRecentBookings();
        } else {
            const data = await res.json();
            showToast(data.error || 'İşlem başarısız.', 'error');
        }
    }

    async function payWithWallet() {
        const user = Store.getUser();
        if (!lastBookingId) return showToast('Rezervasyon bilgisi bulunamadı.', 'error');

        const code = document.getElementById('verificationCodeInput')?.value;
        if (!code) {
            showToast('Lütfen önce e-postanıza gönderilen 6 haneli kodu girin.', 'warning');
            return;
        }

        const res = await Store.api('/api/wallet/pay', { 
            method: 'POST', 
            body: JSON.stringify({ 
                userId: user.id, 
                bookingId: lastBookingId, 
                method: 'Cüzdan',
                code: code
            }) 
        });

        if (res.ok) {
            showToast('Ödeme başarılı! Sürücü aranıyor...', 'success');
            closeModal();
            loadRecentBookings();
        } else {
            const data = await res.json();
            showToast(data.error || 'Ödeme başarısız.', 'error');
            if (data.error?.includes('Yetersiz bakiye')) {
                setTimeout(() => window.location.href = '/wallet.html', 1500);
            }
        }
    }


    async function sendPaymentCode() {
        const user = Store.getUser();
        const btn = document.getElementById('sendCodeBtn');
        btn.disabled = true;
        btn.textContent = 'Gönderiliyor...';

        const res = await Store.api('/api/wallet/send-email', {
            method: 'POST',
            body: JSON.stringify({ email: user.email })
        });

        if (res.ok) {
            showToast('Doğrulama kodu e-postanıza gönderildi.', 'success');
            document.getElementById('verificationSection').style.display = 'block';
            let timeLeft = 60;
            const timer = setInterval(() => {
                timeLeft--;
                btn.textContent = `Tekrar Gönder (${timeLeft}s)`;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.textContent = 'Kodu Tekrar Gönder';
                }
            }, 1000);
        } else {
            const data = await res.json();
            showToast(data.error || 'Kod gönderilemedi.', 'error');
            btn.disabled = false;
            btn.textContent = 'Kodu Gönder';
        }
    }

    async function simulateDriverJourney() {
        if (!startMarker || !endMarker) return;
        const userPos = startMarker.getLatLng();
        const destPos = endMarker.getLatLng();

        // 1. En yakın taksi durağını bul
        let nearestStation = TAXI_STATIONS[0];
        let minDist = Infinity;
        TAXI_STATIONS.forEach(s => {
            const d = calculateLiveDistance(s.lat, s.lng, userPos.lat, userPos.lng);
            if (d < minDist) {
                minDist = d;
                nearestStation = s;
            }
        });

        // 2. Simülasyon taksisi oluştur
        const simTaxi = L.marker([nearestStation.lat, nearestStation.lng], {
            icon: L.divIcon({
                className: 'driver-live-icon',
                html: `
                    <div style="position:relative;">
                        <div class="pulse-ring" style="position:absolute; top:-10px; left:-10px; width:54px; height:54px; background:rgba(245,158,11,0.4); border-radius:50%;"></div>
                        <div style="background:#f59e0b; color:white; border-radius:15px; width:40px; height:40px; display:flex; align-items:center; justify-content:center; box-shadow:0 0 25px rgba(245,158,11,0.7); border:2.5px solid white; position:relative; z-index:2; font-size:1.4rem;">🚕</div>
                    </div>
                `
            })
        }).addTo(map);

        // AŞAMA 1: Durak -> Yolcu
        document.getElementById('driverStatusCard').style.display = 'block';
        document.getElementById('driverStatusTitle').textContent = 'Sürücü Yolda';
        document.getElementById('driverStatusInfo').textContent = 'Sizi almaya geliyor...';
        
        // Rota Al
        const route1Res = await Store.api(`/api/maps/route?startLat=${nearestStation.lat}&startLng=${nearestStation.lng}&endLat=${userPos.lat}&endLng=${userPos.lng}`);
        const route1Data = await route1Res.json();
        const route1Points = route1Data.route || [[nearestStation.lat, nearestStation.lng], [userPos.lat, userPos.lng]];

        await moveSimMarkerOnRoute(simTaxi, route1Points, 120); // 120 km/h

        // AŞAMA 2: Yolcu Alındı -> Varış
        showToast('Sürücü ulaştı! Yolculuk başlıyor.', 'success');
        document.getElementById('driverStatusTitle').textContent = 'Yolculuk Başladı';
        document.getElementById('driverStatusInfo').textContent = 'Hedefe doğru ilerliyorsunuz...';
        
        // Yolcu ikonunu gizle (taksiye bindi)
        if (startMarker) startMarker.getElement().style.opacity = '0';

        // Rota Al
        const route2Res = await Store.api(`/api/maps/route?startLat=${userPos.lat}&startLng=${userPos.lng}&endLat=${destPos.lat}&endLng=${destPos.lng}`);
        const route2Data = await route2Res.json();
        const route2Points = route2Data.route || [[userPos.lat, userPos.lng], [destPos.lat, destPos.lng]];

        await moveSimMarkerOnRoute(simTaxi, route2Points, 120, true); // 120 km/h

        document.getElementById('driverStatusTitle').textContent = 'Varıldı';
        document.getElementById('driverStatusInfo').textContent = 'Hedefe ulaşıldı.';
        document.getElementById('liveDistanceText').textContent = '0 m';
        showToast('Hedefe vardınız!', 'success');
        Store.playSound('success');
        
        // Temizlik
        setTimeout(() => {
            if (simTaxi) map.removeLayer(simTaxi);
            if (endMarker) map.removeLayer(endMarker);
            if (startMarker) {
                startMarker.getElement().style.opacity = '1';
                startMarker.setLatLng(destPos); // Kullanıcı artık varış noktasında
            }
            document.getElementById('driverStatusCard').style.display = 'none';
        }, 5000);
    }

    function moveSimMarkerOnRoute(marker, points, speedKmh, moveUser = false) {
        return new Promise(resolve => {
            if (points.length < 2) return resolve();

            let totalDist = 0;
            let segmentDistances = [];
            for (let i = 0; i < points.length - 1; i++) {
                const d = calculateLiveDistance(points[i][0], points[i][1], points[i+1][0], points[i+1][1]);
                segmentDistances.push(d);
                totalDist += d;
            }

            let lastTime = performance.now();
            let distanceCovered = 0;
            const speedMps = speedKmh * 1000 / 3600;

            function animate(time) {
                const deltaTime = (time - lastTime) / 1000;
                lastTime = time;

                distanceCovered += speedMps * deltaTime;
                
                document.getElementById('driverStatusInfo').textContent = `Yolculuk Devam Ediyor...`;

                const progress = Math.min(distanceCovered / totalDist, 1);
                
                let accumulatedDist = 0;
                let segmentIndex = 0;
                for (let i = 0; i < segmentDistances.length; i++) {
                    if (accumulatedDist + segmentDistances[i] >= distanceCovered) {
                        segmentIndex = i;
                        break;
                    }
                    accumulatedDist += segmentDistances[i];
                }

                const segmentProgress = segmentDistances[segmentIndex] === 0 ? 0 : (distanceCovered - accumulatedDist) / segmentDistances[segmentIndex];
                const p1 = points[segmentIndex];
                const p2 = points[segmentIndex + 1];

                const curPos = [
                    p1[0] + (p2[0] - p1[0]) * segmentProgress,
                    p1[1] + (p2[1] - p1[1]) * segmentProgress
                ];

                marker.setLatLng(curPos);
                if (moveUser && startMarker) startMarker.setLatLng(curPos);

                const remainingDist = Math.max(0, totalDist - distanceCovered);
                const distText = remainingDist > 1000 ? (remainingDist/1000).toFixed(2) + ' km' : Math.round(remainingDist) + ' m';
                document.getElementById('liveDistanceText').textContent = distText;

                if (progress < 1) requestAnimationFrame(animate); 
                else resolve();
            }
            requestAnimationFrame(animate);
        });
    }

    function closeModal() {
        document.getElementById('paymentModal').style.display = 'none';
        
        // Modal durumunu sıfırla
        const methodsSection = document.getElementById('paymentMethodsSection');
        const verificationSection = document.getElementById('verificationSection');
        if(methodsSection) methodsSection.style.display = 'grid';
        if(verificationSection) verificationSection.style.display = 'none';
        
        const codeBtn = document.getElementById('sendCodeBtn');
        if (codeBtn) {
            codeBtn.disabled = false;
            codeBtn.textContent = 'Güvenlik Kodunu Gönder';
        }
        const codeInput = document.getElementById('verificationCodeInput');
        if (codeInput) codeInput.value = '';
    }

    function showWalletVerification() {
        document.getElementById('paymentMethodsSection').style.display = 'none';
        document.getElementById('verificationSection').style.display = 'block';
    }
    document.addEventListener('DOMContentLoaded', init);
    </script>
