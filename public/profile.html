<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil | NexRide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/store.js"></script>
</head>
<body>
    <div class="app-container" style="padding-top: 100px;">
        <div class="card fade-in" style="max-width: 600px; margin: 0 auto;">
            <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px;">
                <div id="userAvatar" class="driver-avatar" style="width: 80px; height: 80px; font-size: 2rem;"></div>
                <div>
                    <h1 id="profileFullName" style="margin-bottom: 5px;">Yükleniyor...</h1>
                    <p id="profileEmail" class="text-muted"></p>
                </div>
            </div>

            <form id="profileForm">
                <div class="grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>Ad</label>
                        <input type="text" id="profFirstName" required>
                    </div>
                    <div class="form-group">
                        <label>Soyad</label>
                        <input type="text" id="profLastName" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Telefon</label>
                    <input type="tel" id="profPhone" placeholder="05xx xxx xxxx">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">
                    Bilgileri Güncelle <i data-lucide="save"></i>
                </button>
            </form>

            <div style="margin-top: 40px; border-top: 1px solid var(--border); padding-top: 30px;">
                <h3>Şifre Değiştir</h3>
                <form id="passwordForm" style="margin-top: 15px;">
                    <div class="form-group">
                        <label>Eski Şifre</label>
                        <input type="password" id="oldPassword" required>
                    </div>
                    <div class="form-group">
                        <label>Yeni Şifre</label>
                        <input type="password" id="newPassword" required>
                    </div>
                    <button type="submit" class="btn btn-secondary" style="width: 100%;">Şifreyi Güncelle</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        async function init() {
            const user = Store.getUser();
            if (!user) return window.location.href = '/';
            
            Store.renderNavbar();
            
            document.getElementById('profileFullName').textContent = `${user.firstName} ${user.lastName}`;
            document.getElementById('profileEmail').textContent = user.email;
            document.getElementById('profFirstName').value = user.firstName;
            document.getElementById('profLastName').value = user.lastName;
            document.getElementById('profPhone').value = user.phone || '';
            
            const initial = user.firstName.charAt(0);
            document.getElementById('userAvatar').textContent = initial;
            
            lucide.createIcons();
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = Store.getUser();
            const formData = {
                firstName: document.getElementById('profFirstName').value,
                lastName: document.getElementById('profLastName').value,
                phone: document.getElementById('profPhone').value
            };

            const res = await Store.api(`/api/users/${user.id}`, {
                method: 'PATCH',
                body: JSON.stringify(formData)
            });

            if (res.ok) {
                showToast('Bilgiler güncellendi.', 'success');
                // Update local storage
                const updatedUser = { ...user, ...formData };
                Store.setUser(updatedUser, Store.getToken());
                setTimeout(() => window.location.reload(), 1000);
            } else {
                const data = await res.json();
                showToast(data.error || 'Güncelleme hatası', 'error');
            }
        });

        document.getElementById('passwordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = Store.getUser();
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;

            const res = await Store.api(`/api/users/${user.id}/password`, {
                method: 'PATCH',
                body: JSON.stringify({ oldPassword, newPassword })
            });

            if (res.ok) {
                showToast('Şifre başarıyla değiştirildi.', 'success');
                document.getElementById('passwordForm').reset();
            } else {
                const data = await res.json();
                showToast(data.error || 'Şifre değiştirme hatası', 'error');
            }
        });

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
